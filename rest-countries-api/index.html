<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A simple React application that fetches and displays data about countries using the REST Countries API."
    />
    <meta
      name="keywords"
      content="countries, api, rest, react, typescript, web development"
    />
    <title>Countries Api</title>
    <script>
      try {
        const storageString = localStorage.getItem("theme-storage");

        if (storageString) {
          const storageData = JSON.parse(storageString);
          if (storageData?.state?.theme === "dark") {
            document.documentElement.classList.add("dark");
          } else {
            document.documentElement.classList.remove("dark");
          }
        }
      } catch (error) {
        console.error("Error al parsear el tema inicial", error);
      }
    </script>
  </head>
  <body
    class="min-h-screen bg-grey-50 text-grey-950 dark:bg-blue-950 dark:text-white"
  >
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
